<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Duck Curve Analysis</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      max-width: 1500px;
      margin: 20px auto;
      padding: 0 20px;
      font-size: 14px;
    }
    h1 { font-size: 1.4em; margin-bottom: 12px; }
    .section { margin-bottom: 14px; }
    .params { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
    .param-group { display: flex; flex-direction: column; gap: 3px; }
    .param-group label { font-weight: bold; font-size: 0.82em; color: #555; }
    .param-group input[type="number"] {
      width: 90px; padding: 4px 6px;
      border: 1px solid #ccc; border-radius: 3px;
    }
    details { border: 1px solid #ddd; border-radius: 4px; padding: 8px 10px; }
    summary { cursor: pointer; font-weight: bold; font-size: 0.9em; }
    #cf_data {
      width: 100%; height: 175px; font-family: monospace; font-size: 0.8em;
      border: 1px solid #ccc; padding: 6px; resize: vertical; margin-top: 8px;
      display: block;
    }
    .data-buttons { margin-top: 6px; display: flex; gap: 8px; }
    .slider-section {
      display: flex; align-items: center; gap: 16px; padding: 9px 12px;
      background: #f5f5f5; border-radius: 4px;
    }
    .slider-label { font-weight: bold; white-space: nowrap; min-width: 230px; }
    #pv_cap_slider { flex: 1; }
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .chart { width: 100%; height: 300px; }
    button {
      padding: 5px 11px; background: #4472C4; color: white;
      border: none; border-radius: 3px; cursor: pointer; font-size: 0.88em;
    }
    button:hover { background: #3460b0; }
    button.secondary { background: #888; }
    button.secondary:hover { background: #666; }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<h1>Duck Curve Analysis</h1>

<div class="section">
  <div class="params">
    <div class="param-group">
      <label>Peak Load (MW)</label>
      <input type="number" id="peak_load" value="100" min="1" step="1">
    </div>
    <div class="param-group">
      <label>Peak Price ($/MWh)</label>
      <input type="number" id="peak_price" value="100" min="1" step="1">
    </div>
    <div class="param-group">
      <label>Max PV Capacity (MW)</label>
      <input type="number" id="pv_max_cap" value="400" min="1" step="1">
    </div>
    <div class="param-group">
      <label>PV Steps</label>
      <input type="number" id="pv_steps" value="40" min="1" max="200" step="1">
    </div>
  </div>
</div>

<div class="section">
  <details>
    <summary>Input Data — capacity factors by hour (editable)</summary>
    <textarea id="cf_data" spellcheck="false"></textarea>
    <div class="data-buttons">
      <button onclick="applyData()">Apply Changes</button>
      <button class="secondary" onclick="resetCfData()">Reset to Default</button>
    </div>
  </details>
</div>

<div class="section slider-section">
  <span class="slider-label">
    PV Capacity: <span id="pv_cap_display">10.0</span> MW
    &nbsp;(step <span id="step_display">1</span> of <span id="steps_display">40</span>)
  </span>
  <input type="range" id="pv_cap_slider" min="1" max="40" value="1">
</div>

<div class="section charts-grid">
  <div id="chart1" class="chart"></div>
  <div id="chart3" class="chart"></div>
  <div id="chart4" class="chart"></div>
</div>

<script>
// ─── Default input data ────────────────────────────────────────────────────
const DEFAULT_CF_DATA = `hour,cf_pv,cf_load
0,0,0.72
1,0,0.69
2,0,0.67
3,0,0.66
4,0,0.65
5,0.01,0.67
6,0.08,0.72
7,0.23,0.75
8,0.42,0.77
9,0.59,0.8
10,0.74,0.83
11,0.82,0.85
12,0.87,0.88
13,0.87,0.91
14,0.84,0.93
15,0.76,0.96
16,0.63,0.99
17,0.47,1
18,0.3,0.99
19,0.13,0.95
20,0.03,0.96
21,0,0.92
22,0,0.85
23,0,0.77`;

// ─── State ─────────────────────────────────────────────────────────────────
let cachedData = null;

// ─── Helpers ───────────────────────────────────────────────────────────────
function resetCfData() {
  document.getElementById('cf_data').value = DEFAULT_CF_DATA;
}

function parseCsv(text) {
  const lines = text.trim().split('\n').filter(l => l.trim() !== '');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = parseFloat(vals[i]); });
    return obj;
  }).filter(row => !isNaN(row[headers[0]]));
}

// ─── Computation ───────────────────────────────────────────────────────────
function compute() {
  const peak_load  = parseFloat(document.getElementById('peak_load').value)  || 100;
  const peak_price = parseFloat(document.getElementById('peak_price').value) || 100;
  const pv_max_cap = parseFloat(document.getElementById('pv_max_cap').value) || 400;
  const pv_steps   = Math.max(1, parseInt(document.getElementById('pv_steps').value) || 40);

  const cfRaw = parseCsv(document.getElementById('cf_data').value);
  if (cfRaw.length === 0) return null;

  const cfData = cfRaw.map(d => ({
    hour: d.hour,
    cf_pv: d.cf_pv,
    load: peak_load * d.cf_load
  }));

  const steps = [];

  for (let i = 1; i <= pv_steps; i++) {
    const pv_cap = pv_max_cap * i / pv_steps;
    const hrRows = [];
    let sumGenPv = 0, sumLoad = 0, sumMaxGenPv = 0;
    let sumGenPvPrice = 0, sumMaxGenPvPrice = 0, sumLoadPrice = 0;

    cfData.forEach(d => {
      const maxgen_pv  = d.cf_pv * pv_cap;
      const gen_pv     = Math.min(d.load, maxgen_pv);
      const gen_other  = d.load - gen_pv;
      const curt_pv    = maxgen_pv - gen_pv;
      const price_load = gen_other / peak_load * peak_price;

      hrRows.push({ hour: d.hour, load: d.load, maxgen_pv, gen_pv, gen_other, curt_pv, price_load });

      sumGenPv         += gen_pv;
      sumLoad          += d.load;
      sumMaxGenPv      += maxgen_pv;
      sumGenPvPrice    += gen_pv     * price_load;
      sumMaxGenPvPrice += maxgen_pv  * price_load;
      sumLoadPrice     += d.load     * price_load;
    });

    const market_share_pv           = sumLoad     > 0 ? sumGenPv         / sumLoad     : 0;
    const lvoe_pv                   = sumGenPv    > 0 ? sumGenPvPrice    / sumGenPv    : 0;
    const lvoe_pv_uncurt            = sumMaxGenPv > 0 ? sumMaxGenPvPrice / sumMaxGenPv : 0;
    const price_ave                 = sumLoad     > 0 ? sumLoadPrice     / sumLoad     : 0;
    const value_factor_pv           = price_ave   > 0 ? lvoe_pv          / price_ave   : 0;
    const value_factor_pv_uncurt    = price_ave   > 0 ? lvoe_pv_uncurt   / price_ave   : 0;
    const integration_cost_pv       = price_ave - lvoe_pv;
    const integration_cost_pv_uncurt = price_ave - lvoe_pv_uncurt;

    steps.push({
      pv_cap, hrRows,
      market_share_pv, lvoe_pv, lvoe_pv_uncurt, price_ave,
      value_factor_pv, value_factor_pv_uncurt,
      integration_cost_pv, integration_cost_pv_uncurt
    });
  }

  return { steps, peak_load, peak_price, pv_steps };
}

// ─── Charts ────────────────────────────────────────────────────────────────
const LEGEND_RIGHT = { x: 1.02, y: 1, xanchor: 'left', yanchor: 'top', font: { size: 11 } };

function renderChart1(data, stepIdx) {
  const s = data.steps[stepIdx - 1];
  const hours = s.hrRows.map(d => d.hour);

  Plotly.react('chart1', [
    {
      x: hours, y: s.hrRows.map(d => d.gen_other),
      name: 'gen_other', type: 'bar',
      marker: { color: '#4472C4' }
    },
    {
      x: hours, y: s.hrRows.map(d => d.gen_pv),
      name: 'gen_pv', type: 'bar',
      marker: { color: '#ED7D31' }
    },
    {
      x: hours, y: s.hrRows.map(d => d.price_load),
      name: 'price_load', type: 'scatter', mode: 'lines+markers',
      yaxis: 'y2',
      line: { color: '#C00000', width: 2 },
      marker: { size: 5 }
    }
  ], {
    title: { text: 'Dispatch & Price by Hour', font: { size: 13 }, y: 0.97, yanchor: 'top' },
    barmode: 'stack',
    xaxis: { title: 'Hour', dtick: 3 },
    yaxis: { title: 'Generation (MW)', range: [0, data.peak_load], showgrid: true },
    yaxis2: {
      title: 'Price ($/MWh)', overlaying: 'y', side: 'right',
      range: [0, data.peak_price], showgrid: false
    },
    legend: { x: 1.22, y: 1, xanchor: 'left', yanchor: 'top', font: { size: 11 } },
    margin: { t: 38, r: 175, b: 45, l: 52 }
  }, { responsive: true });
}

function renderChart3(data, stepIdx) {
  const vars = [
    { key: 'price_ave',                   label: 'Avg Price',                color: '#4472C4' },
    { key: 'lvoe_pv',                     label: 'LVOE PV',                  color: '#70AD47' },
    { key: 'integration_cost_pv_uncurt',  label: 'Integration Cost (uncurt)', color: '#ED7D31' }
  ];

  const sel = data.steps[stepIdx - 1];
  const traces = [];

  vars.forEach(v => {
    traces.push({
      x: data.steps.map(s => s.market_share_pv),
      y: data.steps.map(s => s[v.key]),
      name: v.label, type: 'scatter', mode: 'lines',
      line: { color: v.color, width: 2 }
    });
    traces.push({
      x: [sel.market_share_pv], y: [sel[v.key]],
      type: 'scatter', mode: 'markers',
      marker: { color: v.color, size: 9, line: { color: 'white', width: 1.5 } },
      showlegend: false
    });
  });

  Plotly.react('chart3', traces, {
    title: { text: 'Value Metrics vs Solar Market Share', font: { size: 13 } },
    xaxis: { title: 'Solar Market Share', range: [0, 0.6], tickformat: '.0%' },
    yaxis: { title: '$/MWh', range: [-20, 100] },
    legend: LEGEND_RIGHT,
    margin: { t: 38, r: 160, b: 45, l: 52 }
  }, { responsive: true });
}

function renderChart4(data, stepIdx) {
  const sel = data.steps[stepIdx - 1];

  Plotly.react('chart4', [
    {
      x: data.steps.map(s => s.market_share_pv),
      y: data.steps.map(s => s.value_factor_pv_uncurt),
      name: 'Value Factor (uncurt)', type: 'scatter', mode: 'lines',
      line: { color: '#7030A0', width: 2 }
    },
    {
      x: [sel.market_share_pv], y: [sel.value_factor_pv_uncurt],
      type: 'scatter', mode: 'markers',
      marker: { color: '#7030A0', size: 9, line: { color: 'white', width: 1.5 } },
      showlegend: false
    }
  ], {
    title: { text: 'Value Factor vs Solar Market Share', font: { size: 13 } },
    xaxis: { title: 'Solar Market Share', range: [0, 0.6], tickformat: '.0%' },
    yaxis: { title: 'Value Factor', range: [0, 1.2] },
    legend: LEGEND_RIGHT,
    margin: { t: 38, r: 150, b: 45, l: 52 }
  }, { responsive: true });
}

function renderAll(data, stepIdx) {
  renderChart1(data, stepIdx);
  renderChart3(data, stepIdx);
  renderChart4(data, stepIdx);
}

// ─── Slider sync ───────────────────────────────────────────────────────────
function syncSliderMeta(data) {
  const slider = document.getElementById('pv_cap_slider');
  slider.max   = data.pv_steps;
  const step   = Math.min(parseInt(slider.value) || 1, data.pv_steps);
  slider.value = step;
  const pv_cap = data.steps[step - 1].pv_cap;
  document.getElementById('pv_cap_display').textContent = pv_cap.toFixed(1);
  document.getElementById('step_display').textContent   = step;
  document.getElementById('steps_display').textContent  = data.pv_steps;
  return step;
}

// ─── Update entry points ───────────────────────────────────────────────────
function update() {
  const data = compute();
  if (!data) return;
  cachedData = data;
  renderAll(data, syncSliderMeta(data));
}

function applyData() { update(); }

// ─── Event listeners ───────────────────────────────────────────────────────
document.getElementById('pv_cap_slider').addEventListener('input', function () {
  if (!cachedData) return;
  const step   = parseInt(this.value);
  const pv_cap = cachedData.steps[step - 1].pv_cap;
  document.getElementById('pv_cap_display').textContent = pv_cap.toFixed(1);
  document.getElementById('step_display').textContent   = step;
  renderAll(cachedData, step);
});

['peak_load', 'peak_price', 'pv_max_cap', 'pv_steps'].forEach(id => {
  document.getElementById(id).addEventListener('change', update);
});

// ─── Init ──────────────────────────────────────────────────────────────────
resetCfData();
update();
</script>
</body>
</html>
